<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale Presente: Volume e Glow - Dra. Renata dos Anjos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fffaf3 0%, #f7f3ee 50%, #efe8df 100%);
            display: flex;
            align-items: start;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: min(100vw, calc(100vh * 9 / 16));
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #f7f3ee;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .final-link {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            text-decoration: none;
        }

        .final-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .media-stack {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            opacity: 1;
            transition: opacity 300ms ease;
            z-index: 2;
        }

        .media-stack.fading {
            opacity: 0;
        }

        .media-stack.ended {
            visibility: hidden;
            pointer-events: none;
        }

        .preview-layer,
        .video-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .preview-layer {
            object-fit: cover;
            display: block;
            z-index: 1;
        }

        .video-layer {
            object-fit: cover;
            display: block;
            z-index: 2;
            pointer-events: none;
            opacity: 1;
        }

        .media-stack.ended,
        .media-stack.ended .preview-layer,
        .media-stack.ended .video-layer {
            opacity: 0;
        }

        .video-layer.fade-out {
            opacity: 0;
            transition: opacity 300ms ease;
        }

        .mobile-only-fit {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 767px) {
            .container {
                width: 100%;
                height: auto;
                aspect-ratio: 9 / 16;
                box-shadow: none;
            }

            .final-image,
            .preview-layer,
            .video-layer,
            .media-stack,
            .final-link {
                width: 100%;
            }

            body {
                padding: 0;
                min-height: auto;
                max-height: fit-content;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="final-link" href="https://api.whatsapp.com/send/?phone=554688022986" target="_blank" rel="noopener noreferrer">
            <img class="final-image" src="./volume-e-glow.jpg" alt="Volume e Glow">
        </a>

        <div class="media-stack" id="mediaStack">
            <img class="preview-layer" id="videoPreview" src="./mes-das-maes.jpg" alt="Primeiro frame do vídeo">
            <video class="video-layer" id="videoElement" poster="./mes-das-maes.jpg" playsinline preload="metadata" muted>
                <source src="./mes-das-maes.mp4" type="video/mp4">
                Seu navegador não suporta o elemento de vídeo.
            </video>
        </div>
    </div>

    <script>
        const mediaStack = document.getElementById('mediaStack');
        const videoElement = document.getElementById('videoElement');
        const videoPreview = document.getElementById('videoPreview');
        let fadeTimerId = null;

        function startVideo() {
            if (mediaStack.classList.contains('playing')) {
                return;
            }

            if (mediaStack.classList.contains('ended')) {
                mediaStack.classList.remove('ended');
                videoElement.currentTime = 0;
                videoElement.classList.remove('fade-out');
            }

            mediaStack.classList.add('playing');
            videoPreview.style.opacity = '0';
            videoElement.play();
        }

        mediaStack.addEventListener('click', () => {
            startVideo();
        });

        videoElement.addEventListener('timeupdate', () => {
            if (!videoElement.duration || videoElement.readyState < 2) {
                return;
            }

            const timeLeft = videoElement.duration - videoElement.currentTime;
            
            if (timeLeft <= 0.3 && !mediaStack.classList.contains('fading')) {
                mediaStack.classList.add('fading');
            }
        });

        videoElement.addEventListener('ended', () => {
            mediaStack.classList.remove('playing');
            mediaStack.classList.add('ended');
            mediaStack.classList.remove('fading');
            videoPreview.style.opacity = '0';
            videoElement.classList.remove('fade-out');
            clearTimeout(fadeTimerId);
            fadeTimerId = window.setTimeout(() => {
                mediaStack.classList.add('ended');
            }, 300);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && mediaStack.classList.contains('playing')) {
                videoElement.pause();
                mediaStack.classList.remove('playing', 'fading');
                mediaStack.classList.remove('ended');
                videoElement.currentTime = 0;
                videoPreview.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
